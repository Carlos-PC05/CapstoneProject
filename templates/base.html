<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Desales Exchange Hub</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="nav">
        <div class="nav-content">
            <a href="/dashboard" class="nav-logo">
                <img src="{{ url_for('static', filename='img/assets/DEH logo letras blanco.png') }}" alt="Desales Exchange Hub Logo">
            </a>

            <!-- Barra búsqueda -->
            <form action="{{ url_for('dashboard') }}" method="GET" class="search-form" role="search">
                <button type="submit" class="search-btn">
                    <img src="{{ url_for('static', filename='img/assets/search-white-on-red.svg') }}" alt="Search">
                </button>
                <input type="search" name="q" value="{{ current_search_query }}" placeholder="Search for items..." aria-label="Search for items">
            </form>

            <!-- Botones de navegación -->
            <div class="nav-buttons">
                <a href="{{ url_for('messages') }}" class="nav-icon">
                    <img src="{{ url_for('static', filename='img/assets/mail.svg') }}" alt="Mensajes">
                </a>
                <a href="{{ url_for('favItems') }}" class="nav-icon">
                    <img src="{{ url_for('static', filename='img/assets/WhiteHeart.svg') }}" alt="Favoritos">
                </a>
                <a href="#" class="nav-icon">
                    <img src="{{ url_for('static', filename='img/assets/Bell.svg') }}" alt="Notificaciones">
                </a>
                <a href="{{ url_for('profile') }}" class="nav-icon">
                    <img src="{{ url_for('static', filename='img/assets/User.svg') }}" alt="Perfil">
                </a>
                <a href="{{ url_for('upload') }}" class="upload-button">Upload</a>
            </div>
        </div>
    </nav>

    <div class="layout-container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a class="sidebar-header-allCategories" href="{{ url_for('dashboard') }}">All Categories</a>
            </div>
            
            <div class="scroll-container">
                <ul class="lista-enlaces" id="categoryList">
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Books') }}">Books</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Furniture') }}">Furniture</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Bedding') }}">Bedding</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Appliances') }}">Appliances</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Clothes') }}">Clothes</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Sport') }}">Sport</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Electronics') }}">Electronics</a></li>
                    <li><a class="filter-button" href="{{ url_for('dashboard', category='Others') }}">Others</a></li>
                </ul>
                <div class="scroll-progress-track">
                    <div class="scroll-progress-bar" id="progressBar"></div>
                </div>
            </div>
        </aside> 

        <!-- Contenido principal -->
        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
